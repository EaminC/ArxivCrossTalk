<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>ArXiv Crosstalk · 科研相声生成器</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet"/>
  <style>
    /* ── Design tokens ── */
    :root {
      --primary:    #5b5ef4;
      --primary-dk: #4244d4;
      --surface:    #ffffff;
      --surface2:   #f6f7fd;
      --bg:         #eef0fa;
      --border:     #dde1f0;
      --text:       #1e293b;
      --text-muted: #64748b;
      --shadow:     0 1px 4px rgba(0,0,0,.05), 0 6px 20px rgba(0,0,0,.06);
    }
    body.dark {
      --surface:    #1c1c2e;
      --surface2:   #23233a;
      --bg:         #12121f;
      --border:     #2a2a42;
      --text:       #e2e8f0;
      --text-muted: #94a3b8;
      --shadow:     0 1px 4px rgba(0,0,0,.4), 0 6px 20px rgba(0,0,0,.5);
    }

    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      margin: 0;
      transition: background .25s, color .25s;
    }

    /* ── Header ── */
    .app-header {
      background: linear-gradient(135deg, #3730c4 0%, #6d28d9 55%, #9333ea 100%);
      padding: 1rem 1.5rem;
      display: flex; align-items: center; gap: 1rem;
    }
    .header-brand { display: flex; align-items: center; gap: .85rem; flex: 1; min-width: 0; }
    .icon-wrap {
      background: rgba(255,255,255,.2); border-radius: 12px;
      width: 44px; height: 44px; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0; font-size: 1.35rem; color: #fff;
    }
    .app-header h1 { color: #fff; font-size: 1.28rem; font-weight: 700; margin: 0; white-space: nowrap; }
    .app-header .sub { color: rgba(255,255,255,.72); margin: 0; font-size: .78rem; }
    .header-actions { display: flex; align-items: center; gap: .45rem; flex-shrink: 0; }
    .hbtn {
      background: rgba(255,255,255,.14); border: 1px solid rgba(255,255,255,.22);
      color: #fff; border-radius: 8px; padding: .28rem .62rem;
      font-size: .78rem; font-weight: 600; cursor: pointer; white-space: nowrap;
      transition: background .15s; text-decoration: none; display: flex; align-items: center; gap: .3rem;
    }
    .hbtn:hover { background: rgba(255,255,255,.27); color: #fff; }
    .hbtn.active { background: rgba(255,255,255,.32); }
    .hbtn-sep { width: 1px; height: 18px; background: rgba(255,255,255,.22); }

    /* ── Cards ── */
    .card {
      border: 1px solid var(--border); border-radius: 16px;
      box-shadow: var(--shadow); background: var(--surface);
      transition: background .25s, border-color .25s;
    }
    .sec-label {
      font-size: .69rem; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; color: var(--text-muted); margin-bottom: .5rem;
    }
    .divider { border-top: 1px solid var(--border); margin: 1.1rem 0; }

    /* ── Twin tabs (source / language) ── */
    .twin-tabs { display: flex; gap: .45rem; margin-bottom: .7rem; }
    .twin-tab {
      flex: 1; padding: .4rem .3rem; text-align: center;
      font-size: .82rem; font-weight: 500;
      border: 1.5px solid var(--border); border-radius: 10px; cursor: pointer;
      color: var(--text-muted); background: var(--surface2);
      transition: all .15s; user-select: none;
    }
    .twin-tab.active {
      border-color: var(--primary); background: #eef0fe; color: var(--primary);
    }
    body.dark .twin-tab.active { background: #1e2050; }

    /* ── BGM sub-tabs ── */
    .bgm-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: .7rem; }
    .bgm-tab {
      padding: .35rem .8rem; font-size: .79rem; font-weight: 500;
      cursor: pointer; color: var(--text-muted);
      border-bottom: 2px solid transparent; transition: all .15s; user-select: none;
    }
    .bgm-tab.active { color: var(--primary); border-bottom-color: var(--primary); }

    /* ── Form controls ── */
    .form-control, .form-select {
      border-radius: 10px; border: 1.5px solid var(--border);
      font-size: .85rem; background: var(--surface); color: var(--text);
      transition: background .2s, border-color .2s;
    }
    body.dark .form-control, body.dark .form-select {
      background: var(--surface2); color: var(--text); border-color: var(--border);
    }
    .form-control::placeholder { color: var(--text-muted); }
    .form-control:focus, .form-select:focus {
      border-color: var(--primary); box-shadow: 0 0 0 3px rgba(91,94,244,.13);
      background: var(--surface); color: var(--text);
    }
    body.dark .form-control:focus, body.dark .form-select:focus { background: var(--surface2); }

    /* ── Sliders ── */
    .slider-row { display: flex; align-items: center; gap: .65rem; }
    .slider-row label { font-size: .8rem; color: var(--text-muted); min-width: 70px; }
    .slider-row input[type=range] { flex: 1; accent-color: var(--primary); cursor: pointer; }
    .slider-val { font-size: .8rem; font-weight: 700; color: var(--primary); min-width: 3.2rem; text-align: right; }

    /* ── Generate button ── */
    .btn-gen {
      width: 100%; padding: .68rem; font-size: .92rem; font-weight: 600;
      border: none; border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), #7c3aed);
      color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: .5rem;
      transition: opacity .15s, transform .1s;
    }
    .btn-gen:hover:not(:disabled) { opacity: .88; }
    .btn-gen:active:not(:disabled) { transform: scale(.98); }
    .btn-gen:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Loading overlay ── */
    .loading-overlay {
      display: none; position: absolute; inset: 0; border-radius: 16px;
      background: rgba(255,255,255,.88); z-index: 10;
      flex-direction: column; align-items: center; justify-content: center; gap: 1rem;
    }
    body.dark .loading-overlay { background: rgba(28,28,46,.88); }
    .loading-overlay.show { display: flex; }
    .loading-step { font-size: .85rem; font-weight: 500; color: var(--primary); max-width: 240px; text-align: center; }

    /* ── Empty state ── */
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 300px; color: var(--text-muted);
    }
    .empty-state i { font-size: 3rem; margin-bottom: 1rem; opacity: .5; }
    .empty-state p { font-size: .87rem; }

    /* ── Audio player ── */
    #audio-player { width: 100%; border-radius: 10px; margin-bottom: 1rem; }

    /* ── Result actions ── */
    .result-actions { display: flex; gap: .4rem; flex-wrap: wrap; margin-bottom: 1.1rem; }
    .result-actions .btn { font-size: .8rem; border-radius: 8px; padding: .3rem .72rem; }
    .btn-outline-primary { border-color: var(--primary); color: var(--primary); }
    .btn-outline-primary:hover { background: var(--primary); color: #fff; border-color: var(--primary); }

    /* ── Script bubbles ── */
    .script-wrap {
      max-height: 430px; overflow-y: auto; padding-right: 2px;
      display: flex; flex-direction: column; gap: .5rem;
    }
    .stage-label {
      text-align: center; font-size: .66rem; font-weight: 700;
      letter-spacing: .07em; text-transform: uppercase;
      color: var(--text-muted); margin: .3rem 0 .05rem;
    }
    .bubble {
      max-width: 80%; padding: .52rem .82rem; border-radius: 13px;
      font-size: .82rem; line-height: 1.58;
    }
    .bubble-male   { align-self: flex-end;   background: #eef0fe; color: #2e31a0; border-bottom-right-radius: 4px; }
    .bubble-female { align-self: flex-start; background: #f3e8ff; color: #5b21b6; border-bottom-left-radius: 4px; }
    body.dark .bubble-male   { background: #1e2050; color: #a5b4fc; }
    body.dark .bubble-female { background: #2d1e50; color: #d8b4fe; }
    .bubble-name { font-size: .66rem; font-weight: 700; margin-bottom: .15rem; opacity: .65; }

    /* ── Alert ── */
    #error-msg { font-size: .81rem; }
    body.dark .alert-danger { background: #3d1515; border-color: #7f2020; color: #fca5a5; }

    /* ── Responsive header ── */
    @media (max-width: 600px) {
      .app-header p.sub { display: none; }
      .app-header h1 { font-size: 1.1rem; }
    }
  </style>
</head>
<body>

<!-- ══ Header ══ -->
<div class="app-header">
  <div class="header-brand">
    <div class="icon-wrap"><i class="bi bi-mic-fill"></i></div>
    <div>
      <h1>ArXiv Crosstalk</h1>
      <p class="sub" data-i18n="header_sub">把 arXiv 论文变成科研相声，让学术研究有趣起来</p>
    </div>
  </div>
  <div class="header-actions">
    <!-- GitHub -->
    <a class="hbtn" href="https://github.com/EaminC/ArxivCrossTalk" target="_blank" rel="noopener">
      <i class="bi bi-github"></i><span class="d-none d-sm-inline">GitHub</span>
    </a>
    <div class="hbtn-sep"></div>
    <!-- UI language -->
    <button class="hbtn active" id="ui-zh" onclick="setUILang('zh')">中</button>
    <button class="hbtn" id="ui-en" onclick="setUILang('en')">EN</button>
    <div class="hbtn-sep"></div>
    <!-- Dark mode -->
    <button class="hbtn" id="dark-toggle" onclick="toggleDark()" title="Toggle dark mode">🌙</button>
  </div>
</div>

<!-- ══ Main ══ -->
<div class="container-xl py-4 px-3">
  <div class="row g-4 align-items-start">

    <!-- ── LEFT: Settings ── -->
    <div class="col-lg-5">
      <div class="card p-4 position-relative">
        <div class="loading-overlay" id="left-overlay">
          <div class="spinner-border text-primary" style="width:3rem;height:3rem;" role="status"></div>
          <div class="loading-step" id="step-text">…</div>
        </div>

        <!-- Source -->
        <div class="mb-4">
          <div class="sec-label" data-i18n="section_source">论文来源</div>
          <div class="twin-tabs">
            <div class="twin-tab active" id="tab-preset" onclick="setSource('preset')">
              <i class="bi bi-bookmark-star me-1"></i><span data-i18n="tab_preset">经典论文</span>
            </div>
            <div class="twin-tab" id="tab-custom" onclick="setSource('custom')">
              <i class="bi bi-link-45deg me-1"></i><span data-i18n="tab_custom">自定义链接</span>
            </div>
          </div>
          <div id="panel-preset">
            <select class="form-select" id="preset-select"></select>
          </div>
          <div id="panel-custom" class="d-none">
            <input class="form-control" id="custom-url" type="url"
                   placeholder="https://arxiv.org/abs/1706.03762"/>
          </div>
        </div>

        <div class="divider"></div>

        <!-- Script Language -->
        <div class="mb-4">
          <div class="sec-label" data-i18n="section_lang">相声语言</div>
          <div class="twin-tabs">
            <div class="twin-tab active" id="lang-zh" onclick="setLang('zh')">🇨🇳 中文</div>
            <div class="twin-tab" id="lang-en" onclick="setLang('en')">🇺🇸 English</div>
          </div>
        </div>

        <div class="divider"></div>

        <!-- Script Length -->
        <div class="mb-4">
          <div class="sec-label" data-i18n="section_length">脚本长度</div>
          <div class="twin-tabs">
            <div class="twin-tab" id="len-short" onclick="setLength('short')">
              ⚡ <span data-i18n="len_short">短</span>
            </div>
            <div class="twin-tab active" id="len-medium" onclick="setLength('medium')">
              📄 <span data-i18n="len_medium">中</span>
            </div>
            <div class="twin-tab" id="len-long" onclick="setLength('long')">
              📚 <span data-i18n="len_long">长</span>
            </div>
          </div>
          <div class="form-text" id="length-hint" data-i18n="len_hint_medium">均衡详尽，约 35 段对话，8-12 分钟</div>
        </div>

        <div class="divider"></div>

        <!-- BGM -->
        <div class="mb-4">
          <div class="sec-label" data-i18n="section_bgm">背景音乐</div>
          <div class="bgm-tabs">
            <div class="bgm-tab active" onclick="setBgmTab('preset')" data-i18n="bgm_preset">预设</div>
            <div class="bgm-tab" onclick="setBgmTab('uploaded')" data-i18n="bgm_uploaded">已上传</div>
            <div class="bgm-tab" onclick="setBgmTab('upload')" data-i18n="bgm_upload_new">上传新文件</div>
            <div class="bgm-tab" onclick="setBgmTab('none')" data-i18n="bgm_none">无 BGM</div>
          </div>
          <div id="bgm-preset-panel">
            <select class="form-select" id="bgm-preset-select"></select>
          </div>
          <div id="bgm-uploaded-panel" class="d-none">
            <select class="form-select" id="bgm-uploaded-select"></select>
          </div>
          <div id="bgm-upload-panel" class="d-none">
            <input class="form-control" type="file" id="bgm-file-input" accept=".mp3,.wav,.ogg,.flac"/>
            <div class="form-text mt-1" data-i18n="bgm_upload_hint">支持 MP3 / WAV / OGG / FLAC</div>
          </div>
          <div id="bgm-none-panel" class="d-none">
            <div class="form-text" data-i18n="bgm_none_hint">不添加背景音乐。</div>
          </div>
        </div>

        <div class="divider"></div>

        <!-- Audio params -->
        <div class="mb-4">
          <div class="sec-label" data-i18n="section_audio">音频参数</div>
          <div class="d-flex flex-column gap-2 mt-1">
            <div class="slider-row">
              <label data-i18n="label_bgm_vol">BGM 音量</label>
              <input type="range" id="bgm-ratio" min="0" max="1" step="0.05" value="0.2"
                     oninput="$('bgm-ratio-val').textContent=fmtFloat(this.value)"/>
              <span class="slider-val" id="bgm-ratio-val">0.20</span>
            </div>
            <div class="slider-row">
              <label data-i18n="label_reverb">混响强度</label>
              <input type="range" id="reverb" min="0" max="1" step="0.05" value="0.15"
                     oninput="$('reverb-val').textContent=fmtFloat(this.value)"/>
              <span class="slider-val" id="reverb-val">0.15</span>
            </div>
            <div class="slider-row">
              <label data-i18n="label_speed">语速</label>
              <input type="range" id="speech-rate" min="0.5" max="2.0" step="0.05" value="1.0"
                     oninput="$('speech-rate-val').textContent=parseFloat(this.value).toFixed(2)+'x'"/>
              <span class="slider-val" id="speech-rate-val">1.00x</span>
            </div>
            <div class="form-text" data-i18n="speed_note" style="padding-left:76px;">仅影响语音速度，不影响 BGM 节奏</div>
          </div>
        </div>

        <!-- Error -->
        <div id="error-msg" class="alert alert-danger py-2 d-none mb-3"></div>

        <button class="btn-gen" id="gen-btn" onclick="generate()">
          <i class="bi bi-play-circle-fill"></i>
          <span data-i18n="btn_generate">开始生成</span>
        </button>
      </div>
    </div>

    <!-- ── RIGHT: Result ── -->
    <div class="col-lg-7">
      <div class="card p-4">

        <!-- Empty state -->
        <div class="empty-state" id="empty-state">
          <i class="bi bi-soundwave"></i>
          <p data-i18n="empty_hint">设置参数后点击「开始生成」</p>
        </div>

        <!-- Result -->
        <div class="d-none" id="result-content">
          <div class="sec-label mb-2" data-i18n="sec_result_audio">生成的音频</div>
          <audio controls id="audio-player"></audio>
          <div class="result-actions">
            <a class="btn btn-sm btn-outline-primary" id="download-btn" target="_blank">
              <i class="bi bi-download me-1"></i><span data-i18n="dl_mp3">下载 MP3</span>
            </a>
            <a class="btn btn-sm btn-outline-secondary" id="download-script-btn" target="_blank">
              <i class="bi bi-file-code me-1"></i><span data-i18n="dl_script">下载脚本 JSON</span>
            </a>
            <button class="btn btn-sm btn-outline-secondary" onclick="toggleScript()">
              <i class="bi bi-chat-left-text me-1"></i><span data-i18n="view_script">查看脚本</span>
            </button>
          </div>

          <!-- Script viewer -->
          <div id="script-section" class="d-none">
            <div class="sec-label mb-2" data-i18n="script_title">相声脚本</div>
            <div class="script-wrap" id="script-container"></div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ── i18n ──────────────────────────────────────────────────────────────────
const T = {
  zh: {
    header_sub:      "把 arXiv 论文变成科研相声，让学术研究有趣起来",
    section_source:  "论文来源",     tab_preset:   "经典论文",   tab_custom:   "自定义链接",
    section_lang:    "相声语言",
    section_length:  "脚本长度",
    len_short: "短", len_medium: "中", len_long: "长",
    len_hint_short:  "精华摘要，约 18 段对话，3-5 分钟",
    len_hint_medium: "均衡详尽，约 35 段对话，8-12 分钟",
    len_hint_long:   "深度解析，约 65 段对话，18-25 分钟，含追问反驳",
    section_bgm:     "背景音乐",
    bgm_preset:      "预设",         bgm_uploaded: "已上传",     bgm_upload_new: "上传新文件",  bgm_none: "无 BGM",
    bgm_upload_hint: "支持 MP3 / WAV / OGG / FLAC",
    bgm_none_hint:   "不添加背景音乐。",
    section_audio:   "音频参数",
    label_bgm_vol:   "BGM 音量",     label_reverb: "混响强度",   label_speed: "语速",
    speed_note:      "仅影响语音速度，不影响 BGM 节奏",
    btn_generate:    "开始生成",
    sec_result_audio:"生成的音频",
    empty_hint:      "设置参数后点击「开始生成」",
    dl_mp3:          "下载 MP3",     dl_script:    "下载脚本 JSON", view_script: "查看脚本",
    script_title:    "相声脚本",
    err_no_url:      "请先输入 arXiv 链接或选择经典论文。",
    step1: "正在下载并解析论文 PDF…", step2: "AI 正在创作相声脚本…",
    step3: "合成语音中…",             step4: "混音 & 后处理…",
    fail_pfx: "生成失败：",
    male: "甲", female: "乙",
  },
  en: {
    header_sub:      "Turn arXiv papers into academic stand-up comedy",
    section_source:  "Paper Source", tab_preset:   "Classic Papers", tab_custom:   "Custom URL",
    section_lang:    "Script Language",
    section_length:  "Script Length",
    len_short: "Short", len_medium: "Medium", len_long: "Long",
    len_hint_short:  "Highlights only, ~18 exchanges, 3-5 min",
    len_hint_medium: "Balanced, ~35 exchanges, 8-12 min",
    len_hint_long:   "Deep dive, ~65 exchanges, 18-25 min, with rebuttals",
    section_bgm:     "Background Music",
    bgm_preset:      "Preset",        bgm_uploaded: "Uploaded",      bgm_upload_new: "Upload New",  bgm_none: "No BGM",
    bgm_upload_hint: "Supports MP3 / WAV / OGG / FLAC",
    bgm_none_hint:   "No background music will be added.",
    section_audio:   "Audio Parameters",
    label_bgm_vol:   "BGM Volume",    label_reverb: "Reverb",        label_speed: "Speed",
    speed_note:      "Voice speed only — BGM tempo is unaffected",
    btn_generate:    "Generate",
    sec_result_audio:"Generated Audio",
    empty_hint:      "Configure settings and click Generate",
    dl_mp3:          "Download MP3",  dl_script:    "Download JSON",  view_script: "View Script",
    script_title:    "Crosstalk Script",
    err_no_url:      "Please enter an arXiv link or select a paper.",
    step1: "Downloading & parsing PDF…", step2: "AI writing script…",
    step3: "Synthesizing speech…",       step4: "Mixing & post-processing…",
    fail_pfx: "Generation failed: ",
    male: "A", female: "B",
  },
};

const STAGE_LABELS = {
  zh: { opening:"开场", intro:"引言", background:"背景", motivation:"动机",
        innovation:"创新点", method:"方法", experiments:"实验", outlook:"展望", ending:"收场" },
  en: { opening:"Opening", intro:"Introduction", background:"Background", motivation:"Motivation",
        innovation:"Innovation", method:"Method", experiments:"Experiments", outlook:"Outlook", ending:"Ending" },
};

let _uiLang = 'zh';
const t = k => (T[_uiLang] || T.zh)[k] || k;
const $  = id => document.getElementById(id);

function applyTranslations() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
}

function setUILang(lang) {
  _uiLang = lang;
  $('ui-zh').classList.toggle('active', lang === 'zh');
  $('ui-en').classList.toggle('active', lang === 'en');
  applyTranslations();
}

// ── Dark mode ────────────────────────────────────────────────────────────
let _dark = false;
function toggleDark() {
  _dark = !_dark;
  document.body.classList.toggle('dark', _dark);
  $('dark-toggle').textContent = _dark ? '☀️' : '🌙';
}

// ── State ────────────────────────────────────────────────────────────────
let _source = 'preset', _lang = 'zh', _bgmTab = 'preset', _length = 'medium';
const fmtFloat = v => parseFloat(v).toFixed(2);

function setSource(v) {
  _source = v;
  ['preset','custom'].forEach(k => {
    $(`tab-${k}`).classList.toggle('active', k === v);
    $(`panel-${k}`).classList.toggle('d-none', k !== v);
  });
}

function setLang(v) {
  _lang = v;
  $('lang-zh').classList.toggle('active', v === 'zh');
  $('lang-en').classList.toggle('active', v === 'en');
}

const _LEN_KEYS = ['short','medium','long'];
function setLength(v) {
  _length = v;
  _LEN_KEYS.forEach(k => $(`len-${k}`).classList.toggle('active', k === v));
  $('length-hint').dataset.i18n = `len_hint_${v}`;
  $('length-hint').textContent  = t(`len_hint_${v}`);
}

const BGM_KEYS = ['preset','uploaded','upload','none'];
function setBgmTab(v) {
  _bgmTab = v;
  document.querySelectorAll('.bgm-tab').forEach((el, i) => el.classList.toggle('active', BGM_KEYS[i] === v));
  BGM_KEYS.forEach(k => $(`bgm-${k}-panel`).classList.toggle('d-none', k !== v));
}

// ── Load remote data ─────────────────────────────────────────────────────
async function loadPresets() {
  const { presets } = await fetch('/api/presets').then(r => r.json());
  $('preset-select').innerHTML = presets.map(p => `<option value="${p.url}">${p.name}</option>`).join('');
}

async function loadBgmFiles() {
  const { preset, uploaded } = await fetch('/api/bgm-files').then(r => r.json());
  $('bgm-preset-select').innerHTML   = preset.length   ? preset.map(f   => `<option value="${f}">${f}</option>`).join('') : '<option value="">—</option>';
  $('bgm-uploaded-select').innerHTML = uploaded.length ? uploaded.map(f => `<option value="${f}">${f}</option>`).join('') : '<option value="">—</option>';
}

// ── Script renderer ───────────────────────────────────────────────────────
function toggleScript() { $('script-section').classList.toggle('d-none'); }

function renderScript(segments) {
  const box = $('script-container');
  box.innerHTML = '';
  const stageMap = STAGE_LABELS[_uiLang] || STAGE_LABELS.zh;
  let lastStage = '';
  segments.forEach(seg => {
    if (seg.stage !== lastStage) {
      const lbl = document.createElement('div');
      lbl.className = 'stage-label';
      lbl.textContent = `── ${stageMap[seg.stage] || seg.stage} ──`;
      box.appendChild(lbl);
      lastStage = seg.stage;
    }
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;flex-direction:column';
    const bubble = document.createElement('div');
    bubble.className = `bubble bubble-${seg.role}`;
    const name = document.createElement('div');
    name.className = 'bubble-name';
    name.textContent = seg.role === 'male' ? `${t('male')} ▸` : `◂ ${t('female')}`;
    bubble.appendChild(name);
    bubble.appendChild(document.createTextNode(seg.text));
    wrap.appendChild(bubble);
    box.appendChild(wrap);
  });
}

// ── Generate ─────────────────────────────────────────────────────────────
const STEP_KEYS = ['step1','step2','step3','step4'];
async function generate() {
  const btn     = $('gen-btn');
  const overlay = $('left-overlay');
  const stepEl  = $('step-text');
  const errEl   = $('error-msg');

  errEl.classList.add('d-none');

  const arxivUrl  = _source === 'custom' ? $('custom-url').value.trim() : '';
  const presetUrl = _source === 'preset' ? $('preset-select').value     : '';
  if (!arxivUrl && !presetUrl) {
    errEl.textContent = t('err_no_url');
    errEl.classList.remove('d-none');
    return;
  }

  btn.disabled = true;
  overlay.classList.add('show');

  let si = 0;
  stepEl.textContent = t(STEP_KEYS[si]);
  const timer = setInterval(() => {
    si = Math.min(si + 1, STEP_KEYS.length - 1);
    stepEl.textContent = t(STEP_KEYS[si]);
  }, 8000);

  try {
    const fd = new FormData();
    fd.append('arxiv_url',          arxivUrl);
    fd.append('preset_url',         presetUrl);
    fd.append('language',           _lang);
    fd.append('length',             _length);
    fd.append('bgm_source',         _bgmTab);
    fd.append('bgm_preset_file',    $('bgm-preset-select').value);
    fd.append('bgm_uploaded_file',  $('bgm-uploaded-select').value);
    fd.append('bgm_mix_ratio',      $('bgm-ratio').value);
    fd.append('reverb_amount',      $('reverb').value);
    fd.append('speech_rate',        $('speech-rate').value);
    if (_bgmTab === 'upload') {
      const fi = $('bgm-file-input');
      if (fi.files[0]) fd.append('bgm_file', fi.files[0]);
    }

    const res  = await fetch('/api/generate', { method: 'POST', body: fd });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Server error');

    $('empty-state').classList.add('d-none');
    $('result-content').classList.remove('d-none');
    $('audio-player').src            = data.audio_url;
    $('download-btn').href           = data.audio_url;
    $('download-script-btn').href    = data.script_url;
    if (data.script?.segments) renderScript(data.script.segments);
    loadBgmFiles();

  } catch (e) {
    errEl.textContent = t('fail_pfx') + e.message;
    errEl.classList.remove('d-none');
  } finally {
    clearInterval(timer);
    btn.disabled = false;
    overlay.classList.remove('show');
  }
}

// ── Init ──────────────────────────────────────────────────────────────────
loadPresets();
loadBgmFiles();
applyTranslations();
</script>
</body>
</html>
